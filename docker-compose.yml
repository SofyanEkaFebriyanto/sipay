services:
  app:
    build: .
    container_name: sipay_app
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  webserver:
    image: nginx:latest
    container_name: sipay_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: sipay_db
    restart: always
    environment:
      MYSQL_DATABASE: sipay
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
