services:
  app:
    build: .
    container_name: sipay_app
    ports:
      - "8000:8000"
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: sipay_db
    restart: always
    environment:
      MYSQL_DATABASE: sipay
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sipay
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: